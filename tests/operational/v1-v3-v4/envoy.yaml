# Native-Envoy MCP lane - bare Envoy v1.38.0 in front of two mock MCP backends.
#
# No broker, no ext-proc, no Istio. Envoy's own MCP filters handle parsing and aggregation.
#
# Request flow:
#   client -> :10000 -> http_connection_manager
#                         -> envoy.filters.http.mcp         (parse MCP -> dynamic metadata)   [C1]
#                         -> envoy.filters.http.mcp_router  (fan out + prefix-merge, terminal) [C3]
#                       -> backend_a (server1) and backend_b (server2)
#
# Config fields taken from the pinned v1.38.0 protos:
#   api/envoy/extensions/filters/http/mcp/v3/mcp.proto
#   api/envoy/extensions/filters/http/mcp_router/v3/mcp_router.proto

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: mcp_gateway
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mcp_gw
                http_filters:
                  # 1) The MCP parser. Reads the JSON-RPC body, pulls out method/id/params,
                  #    and writes them as dynamic metadata under "envoy.filters.http.mcp".
                  #    (That metadata is read by an external authorizer in the C2 lane.)
                  - name: envoy.filters.http.mcp
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
                      traffic_mode: PASS_THROUGH

                  # 2) The MCP router. Fans out tools/list to every backend, merges the
                  #    results, and prefixes each tool with its server name + "__" so
                  #    colliding tool names stay distinct. This filter is TERMINAL -
                  #    it replaces envoy.filters.http.router, so nothing follows it.
                  - name: envoy.filters.http.mcp_router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.mcp_router.v3.McpRouter
                      servers:
                        - name: server1
                          mcp_cluster:
                            cluster: backend_a
                            path: "/"
                        - name: server2
                          mcp_cluster:
                            cluster: backend_b
                            path: "/"
                # A route_config must exist for the connection manager even though
                # mcp_router overrides the actual backend choice. The cluster here
                # is a placeholder only.
                route_config:
                  name: local
                  virtual_hosts:
                    - name: mcp
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: backend_a }

  clusters:
    # STRICT_DNS so Envoy resolves the docker-compose service names.
    - name: backend_a
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_a
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend-a, port_value: 9001 }

    - name: backend_b
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_b
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend-b, port_value: 9002 }
