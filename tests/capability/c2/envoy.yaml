# C2: native-lane-authz - Envoy v1.38.0 with mcp_filter + ext_authz (OPA) + mcp_router.
#
# Filter chain (request path, in order):
#   1. mcp_filter  - parses JSON-RPC body, writes method + tool_name to dynamic metadata
#                    under the namespace "envoy.filters.http.mcp"                      [C1/C2]
#   2. ext_authz   - gRPC call to OPA; metadata_context_namespaces tells Envoy to
#                    include "envoy.filters.http.mcp" in the CheckRequest so OPA
#                    can read tool_name and allow/deny without a header                [C2]
#   3. mcp_router  - fan-out + prefix-merge + routing (terminal, replaces router)     [C3]
#
# The ext_authz filter short-circuits the chain on denial (returns 403 before
# mcp_router runs). On allow it passes control to mcp_router unchanged.

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: mcp_gateway
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mcp_gw
                http_filters:
                  # 1) MCP parser: reads JSON-RPC body -> writes to dynamic metadata
                  #    namespace "envoy.filters.http.mcp". The ext_authz filter below
                  #    reads that namespace directly via metadata_context_namespaces -
                  #    no header injection step needed (this is the C2 claim).
                  - name: envoy.filters.http.mcp
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
                      traffic_mode: PASS_THROUGH

                  # 2) Authorization check: gRPC call to OPA.
                  #    metadata_context_namespaces causes Envoy to embed the
                  #    "envoy.filters.http.mcp" metadata inside the CheckRequest so
                  #    OPA can evaluate it in its Rego policy.
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      grpc_service:
                        envoy_grpc:
                          cluster_name: authz
                        timeout: 5s
                      transport_api_version: V3
                      metadata_context_namespaces:
                        - envoy.filters.http.mcp
                      failure_mode_allow: false

                  # 3) MCP router (terminal): fan-out, prefix-merge, routing.
                  #    Only reached when ext_authz allows the request.
                  - name: envoy.filters.http.mcp_router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.mcp_router.v3.McpRouter
                      servers:
                        - name: server1
                          mcp_cluster:
                            cluster: backend_a
                            path: "/"
                        - name: server2
                          mcp_cluster:
                            cluster: backend_b
                            path: "/"

                route_config:
                  name: local
                  virtual_hosts:
                    - name: mcp
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: backend_a }

  clusters:
    - name: backend_a
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_a
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend-a, port_value: 9001 }

    - name: backend_b
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_b
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend-b, port_value: 9002 }

    # authz cluster: OPA's gRPC ext_authz server.
    # HTTP/2 is required for gRPC.
    - name: authz
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: authz
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: authz, port_value: 9191 }
