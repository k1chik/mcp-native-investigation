apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-mcp-server
  namespace: mcp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-mcp-server
  template:
    metadata:
      labels:
        app: mock-mcp-server
    spec:
      containers:
        - name: server
          image: mcp-server1:demo
          imagePullPolicy: Never
          command: ["/mcp-test-server", "--http", "0.0.0.0:9090"]
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: mock-mcp-server
  namespace: mcp-demo
spec:
  selector:
    app: mock-mcp-server
  ports:
    - port: 9090
      targetPort: 9090
